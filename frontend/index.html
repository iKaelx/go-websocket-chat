<!DOCTYPE html>
<html>
<head>
  <title>Go AI Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .header {
      padding: 15px;
      background: #111827;
      text-align: center;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 8px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #374151;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="header">AI Chat (Go + WebSocket + Groq)</div>

    <div id="chat"></div>

    <div class="input-box">
      <input id="msg" placeholder="Type message..." />
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

  <script>
    const ws = new WebSocket("ws://localhost:8080/ws");

    const chat = document.getElementById("chat");

    function addMsg(text, type) {
      const div = document.createElement("div");
      div.classList.add("msg", type);
      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    ws.onmessage = (event) => {
      addMsg(event.data, "ai");
    };

    function sendMsg() {
      const input = document.getElementById("msg");
      const text = input.value;

      if (!text) return;

      addMsg(text, "user");
      ws.send(text);

      input.value = "";
    }
  </script>
</body>
</html>
